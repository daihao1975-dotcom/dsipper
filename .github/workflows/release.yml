name: release

# Push a `vX.Y.Z` tag → static cross-build 4 platforms, generate SHA256SUMS,
# attach all of them to an auto-created GitHub Release (body = the CHANGELOG
# entry for that version, if present, otherwise the tag's annotation message).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: parse tag
        id: tag
        run: |
          # strip leading v: vX.Y.Z → X.Y.Z
          tag="${GITHUB_REF#refs/tags/}"
          ver="${tag#v}"
          echo "tag=$tag"   >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: cross build
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          make cross VERSION="$VERSION"
          (cd bin && sha256sum dsipper-* > SHA256SUMS)
          ls -lh bin/

      - name: extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if [ -f CHANGELOG.md ]; then
            # Pull the section header `## [vX.Y.Z]` and everything up to the next `## `.
            awk -v t="$tag" '
              $0 ~ "^## \\["t"\\]" { hit=1; print; next }
              hit && /^## / { exit }
              hit { print }
            ' CHANGELOG.md > /tmp/notes.md
          fi
          if [ ! -s /tmp/notes.md ]; then
            echo "Release $tag" > /tmp/notes.md
          fi
          echo "path=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.path }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES" \
            bin/dsipper-darwin-arm64 \
            bin/dsipper-darwin-amd64 \
            bin/dsipper-linux-amd64 \
            bin/dsipper-linux-arm64 \
            bin/SHA256SUMS
